<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | 鮮鶴韓国語学院</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Same styles as above */
        .thanks-container { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .thanks-content { max-width: 600px; }
        .thanks-icon { font-size: 3rem; color: var(--accent-pink); margin-bottom: 2rem; }
        .thanks-content h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .thanks-content p { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 2rem; }
        .btn-home { display: inline-block; padding: 1rem 2rem; background: var(--ink-black); color: var(--paper-white); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .btn-home:hover { background: var(--accent-pink); }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-content reveal active">
            <div class="thanks-icon">
                <i class="far fa-paper-plane"></i>
            </div>
            <h1>お問い合わせありがとうございます</h1>
            <p>メッセージは正常に送信されました。内容を確認の上、担当者より折り返しご連絡させていただきます。</p>
            <a href="index-jp.html" class="btn-home">ホームに戻る</a>
        </div>
    </div>
</body>
</html>
