<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | Sunhak Institute</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Specific styles for the Thank You layout */
        .thanks-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .thanks-content {
            max-width: 600px;
        }
        .thanks-icon {
            font-size: 3rem;
            color: var(--accent-pink);
            margin-bottom: 2rem;
        }
        .thanks-content h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .thanks-content p {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--ink-black);
        }
        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--ink-black);
            color: var(--paper-white);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: var(--accent-pink);
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-content reveal active">
            <div class="thanks-icon">
                <i class="far fa-paper-plane"></i>
            </div>
            <h1>Thank You</h1>
            <p>Your inquiry has been received. A member of our admissions team will review your message and reach out to you shortly.</p>
            <a href="index.html" class="btn-home">Return to Home</a>
        </div>
    </div>
</body>
</html>
